<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JamVibes – Listen Together</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://www.youtube.com/iframe_api"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #16161f;
    --surface: #1e1e2e;
    --surface2: #252538;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #e8ff47;
    --accent-dim: rgba(232,255,71,0.12);
    --red: #ff6b6b;
    --green: #6bffb8;
    --text: #f0f0f8;
    --text2: #9090a8;
    --text3: #50505f;
    --ff: 'Syne', sans-serif;
    --fb: 'DM Sans', sans-serif;
    --r: 14px;
    --rs: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--fb); font-size: 15px; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
  button { cursor: pointer; font-family: var(--fb); border: none; background: none; color: inherit; }
  input { font-family: var(--fb); }

  /* ── Pages ── */
  .page { display: none; }
  .page.active { display: flex; }

  /* ══════════ LOBBY ══════════ */
  #lobby {
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
    flex-direction: column;
  }
  .lobby-glow1 { position: fixed; top: -15%; left: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(232,255,71,0.05) 0%, transparent 65%); pointer-events: none; }
  .lobby-glow2 { position: fixed; bottom: -15%; right: -5%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(107,255,184,0.04) 0%, transparent 65%); pointer-events: none; }

  .lobby-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 40px;
    width: 100%;
    max-width: 430px;
    position: relative;
    z-index: 1;
    animation: fadeUp .45s ease both;
    box-shadow: 0 32px 80px rgba(0,0,0,.45);
  }
  .lobby-logo { display: flex; align-items: center; gap: 13px; margin-bottom: 30px; }
  .lobby-logo-icon { font-size: 34px; filter: drop-shadow(0 0 14px rgba(232,255,71,.35)); }
  .lobby-logo h1 { font-family: var(--ff); font-size: 26px; font-weight: 800; color: var(--accent); letter-spacing: -.5px; line-height: 1; }
  .lobby-logo p { font-size: 12px; color: var(--text3); margin-top: 3px; }

  .tabs { display: grid; grid-template-columns: 1fr 1fr; background: var(--bg3); border-radius: var(--rs); padding: 4px; margin-bottom: 26px; gap: 4px; }
  .tab { padding: 10px; border-radius: 7px; font-size: 13px; font-weight: 600; color: var(--text2); transition: all .2s; font-family: var(--ff); }
  .tab.active { background: var(--surface2); color: var(--text); }

  .field { margin-bottom: 18px; }
  .label { display: block; font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; font-family: var(--ff); }
  .label .opt { font-weight: 400; text-transform: none; letter-spacing: 0; }
  .inp {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--rs);
    padding: 11px 14px; font-size: 14px; color: var(--text); outline: none; transition: border-color .2s;
  }
  .inp::placeholder { color: var(--text3); }
  .inp:focus { border-color: var(--accent); }

  .avatar-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .av-btn { width: 38px; height: 38px; border-radius: 9px; font-size: 17px; background: var(--bg3); border: 2px solid transparent; transition: all .15s; display: flex; align-items: center; justify-content: center; }
  .av-btn:hover { transform: scale(1.1); }
  .av-btn.sel { border-color: var(--accent); background: var(--accent-dim); }

  .err-msg { background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.2); border-radius: var(--rs); padding: 9px 13px; font-size: 12px; color: var(--red); margin-bottom: 14px; display: none; }
  .err-msg.show { display: block; }

  .primary-btn {
    width: 100%; background: var(--accent); color: var(--bg); font-family: var(--ff); font-weight: 700;
    font-size: 14px; padding: 13px; border-radius: var(--rs); transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 6px;
  }
  .primary-btn:hover:not(:disabled) { background: #f2ff60; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,255,71,.28); }
  .primary-btn:disabled { opacity: .45; cursor: not-allowed; }

  /* ══════════ ROOM ══════════ */
  #room { flex-direction: column; height: 100vh; overflow: hidden; }

  .room-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 22px; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0;
  }
  .room-header-left { display: flex; align-items: center; gap: 11px; }
  .room-logo-icon { font-size: 22px; }
  .room-name { font-family: var(--ff); font-size: 15px; font-weight: 700; line-height: 1; }
  .room-code-btn { font-size: 11px; color: var(--text3); font-family: 'Courier New', monospace; transition: color .2s; background: none; border: none; cursor: pointer; padding: 0; margin-top: 3px; display: block; text-align: left; }
  .room-code-btn:hover { color: var(--accent); }
  .room-header-right { display: flex; align-items: center; gap: 10px; }
  .online-badge { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
  .online-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
  .leave-btn { background: rgba(255,107,107,.1); color: var(--red); border: 1px solid rgba(255,107,107,.18); border-radius: 7px; padding: 6px 13px; font-size: 12px; transition: all .2s; }
  .leave-btn:hover { background: rgba(255,107,107,.2); }

  .room-body { flex: 1; display: grid; grid-template-columns: 360px 1fr; overflow: hidden; }

  /* ── Left col ── */
  .left-col { display: flex; flex-direction: column; gap: 14px; border-right: 1px solid var(--border); overflow-y: auto; padding: 20px; }

  .now-playing-card { background: var(--surface); border-radius: var(--r); padding: 20px; border: 1px solid var(--border); }

  .album-art { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; background: var(--bg3); margin-bottom: 16px; }
  .album-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .now-art-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px; opacity: .2; }

  .playing-bars { position: absolute; bottom: 10px; right: 10px; display: flex; align-items: flex-end; gap: 3px; background: rgba(0,0,0,.55); border-radius: 6px; padding: 5px 7px; }
  .bar { width: 3px; height: 14px; background: var(--accent); border-radius: 2px; transform-origin: bottom; animation: barBounce .75s ease infinite; }
  .bar:nth-child(2) { animation-delay: .15s; }
  .bar:nth-child(3) { animation-delay: .3s; }
  .bar:nth-child(4) { animation-delay: .45s; }

  .song-title { font-family: var(--ff); font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .song-artist { font-size: 13px; color: var(--text2); margin-bottom: 2px; }
  .song-addedby { font-size: 11px; color: var(--text3); margin-bottom: 16px; }

  .empty-player { text-align: center; padding: 24px 0; }
  .empty-player .ei { font-size: 36px; opacity: .25; margin-bottom: 10px; }
  .empty-player p { font-size: 14px; font-weight: 500; margin-bottom: 4px; color: var(--text2); }
  .empty-player span { font-size: 12px; color: var(--text3); }

  .progress-wrap { margin-bottom: 16px; cursor: pointer; }
  .progress-track { height: 4px; background: var(--bg3); border-radius: 2px; position: relative; transition: height .15s; }
  .progress-wrap:hover .progress-track { height: 6px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; pointer-events: none; transition: width .5s linear; }
  .progress-thumb { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 11px; height: 11px; background: #fff; border-radius: 50%; pointer-events: none; opacity: 0; transition: opacity .15s; }
  .progress-wrap:hover .progress-thumb { opacity: 1; }
  .times { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); margin-top: 6px; font-variant-numeric: tabular-nums; }

  .controls { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .vol-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
  .vol-slider { flex: 1; accent-color: var(--accent); max-width: 75px; cursor: pointer; }
  .play-controls { display: flex; align-items: center; gap: 8px; }
  .play-btn {
    width: 48px; height: 48px; border-radius: 50%; background: var(--accent); color: var(--bg);
    font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0;
  }
  .play-btn:hover:not(:disabled) { transform: scale(1.07); box-shadow: 0 6px 20px rgba(232,255,71,.32); }
  .play-btn:disabled { opacity: .3; cursor: not-allowed; }
  .skip-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--surface2); color: var(--text2); font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .skip-btn:hover:not(:disabled) { background: var(--border2); color: var(--text); }
  .skip-btn:disabled { opacity: .3; cursor: not-allowed; }
  .icon-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--surface2); color: var(--text2); font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .icon-btn:hover { background: var(--border2); color: var(--text); }
  .icon-btn.lit { background: var(--accent-dim); color: var(--accent); }

  .host-note { text-align: center; font-size: 11px; color: var(--text3); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }

  /* Add song */
  .add-song-card { background: var(--surface); border-radius: var(--r); padding: 18px; border: 1px solid var(--border); }
  .card-title { font-family: var(--ff); font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text3); margin-bottom: 11px; }
  .add-form { display: flex; gap: 7px; }
  .add-inp { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--rs); padding: 9px 13px; font-size: 13px; color: var(--text); outline: none; transition: border-color .2s; }
  .add-inp::placeholder { color: var(--text3); }
  .add-inp:focus { border-color: var(--accent); }
  .add-btn { width: 38px; height: 38px; flex-shrink: 0; background: var(--accent); color: var(--bg); border-radius: var(--rs); font-size: 20px; font-weight: 700; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .add-btn:hover:not(:disabled) { background: #f2ff60; }
  .add-btn:disabled { opacity: .45; cursor: not-allowed; }
  .add-err { font-size: 11px; color: var(--red); margin-top: 7px; display: none; }
  .add-err.show { display: block; }

  /* ── Right col (panels) ── */
  .right-col { display: flex; flex-direction: column; overflow: hidden; }

  .panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg2); }
  .panel-tab { flex: 1; padding: 13px 6px; font-size: 12px; font-weight: 600; color: var(--text3); border-bottom: 2px solid transparent; transition: all .2s; font-family: var(--ff); }
  .panel-tab:hover { color: var(--text2); }
  .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .panel-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .panel.active { display: flex; }

  /* Queue panel */
  .queue-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
  .queue-item { display: flex; align-items: center; gap: 9px; padding: 9px; background: var(--surface); border-radius: 9px; border: 1px solid var(--border); animation: fadeUp .25s ease both; }
  .queue-pos { font-size: 11px; color: var(--text3); width: 14px; text-align: center; flex-shrink: 0; }
  .queue-thumb { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--bg3); }
  .queue-meta { flex: 1; overflow: hidden; }
  .queue-title { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .queue-sub { font-size: 10px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Chat panel */
  .chat-messages { flex: 1; overflow-y: auto; padding: 13px; display: flex; flex-direction: column; gap: 8px; }
  .chat-msg { display: flex; align-items: flex-end; gap: 7px; animation: slideIn .2s ease both; }
  .chat-msg.own { flex-direction: row-reverse; }
  .msg-av { width: 26px; height: 26px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .msg-body { max-width: 72%; display: flex; flex-direction: column; gap: 2px; }
  .own .msg-body { align-items: flex-end; }
  .msg-name { font-size: 10px; color: var(--text3); padding: 0 3px; }
  .msg-bubble { background: var(--surface2); border-radius: 11px; border-bottom-left-radius: 3px; padding: 7px 11px; font-size: 12px; line-height: 1.45; word-break: break-word; }
  .own .msg-bubble { background: var(--accent-dim); color: var(--accent); border-bottom-left-radius: 11px; border-bottom-right-radius: 3px; }
  .msg-time { font-size: 9px; color: var(--text3); padding: 0 3px; }
  .chat-form { display: flex; gap: 7px; padding: 11px 14px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .chat-inp { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 18px; padding: 8px 14px; font-size: 12px; color: var(--text); outline: none; transition: border-color .2s; }
  .chat-inp::placeholder { color: var(--text3); }
  .chat-inp:focus { border-color: var(--accent); }
  .chat-send { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); color: var(--bg); font-size: 13px; font-weight: 700; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .chat-send:disabled { opacity: .3; cursor: not-allowed; }
  .chat-send:hover:not(:disabled) { background: #f2ff60; transform: scale(1.05); }

  /* Users panel */
  .users-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
  .user-item { display: flex; align-items: center; gap: 10px; padding: 11px; background: var(--surface); border-radius: 9px; border: 1px solid var(--border); }
  .user-av { position: relative; width: 34px; height: 34px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .user-online { position: absolute; bottom: 0; right: 0; width: 8px; height: 8px; background: var(--green); border: 2px solid var(--surface); border-radius: 50%; }
  .user-name { font-size: 13px; font-weight: 500; flex: 1; }
  .host-badge { font-size: 9px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(232,255,71,.2); border-radius: 4px; padding: 2px 6px; font-family: var(--ff); }

  /* Empty states */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; color: var(--text3); padding: 40px 20px; }
  .empty-state .es-icon { font-size: 28px; opacity: .35; }
  .empty-state p { font-size: 13px; color: var(--text2); font-weight: 500; }
  .empty-state span { font-size: 11px; }

  /* Spinner */
  .spinner { width: 15px; height: 15px; border: 2px solid rgba(0,0,0,.2); border-top-color: var(--bg); border-radius: 50%; animation: spin .65s linear infinite; }

  /* Video float */
  #yt-float {
    display: none; position: fixed; bottom: 20px; right: 20px; width: 300px; height: 168px;
    background: #000; border-radius: 10px; overflow: hidden; z-index: 99;
    box-shadow: 0 12px 40px rgba(0,0,0,.6); border: 1px solid var(--border2);
  }
  #yt-float.show { display: block; }
  #yt-float-close { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,.65); color: #fff; border-radius: 50%; width: 22px; height: 22px; font-size: 10px; z-index: 2; display: flex; align-items: center; justify-content: center; }

  /* ── Animations ── */
  @keyframes fadeUp   { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
  @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:.4; } }
  @keyframes spin     { to { transform:rotate(360deg); } }
  @keyframes barBounce{ 0%,100% { transform:scaleY(.25); } 50% { transform:scaleY(1); } }
  @keyframes slideIn  { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:translateX(0); } }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .room-body { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .left-col { border-right: none; border-bottom: 1px solid var(--border); max-height: 420px; }
  }
</style>
</head>
<body>

<!-- ══════════ LOBBY PAGE ══════════ -->
<div id="lobby" class="page active">
  <div class="lobby-glow1"></div>
  <div class="lobby-glow2"></div>

  <div class="lobby-card">
    <div class="lobby-logo">
      <div class="lobby-logo-icon">🎵</div>
      <div>
        <h1>JamVibes</h1>
        <p>Listen together, live.</p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-create" onclick="switchTab('create')">Create Room</button>
      <button class="tab" id="tab-join" onclick="switchTab('join')">Join Room</button>
    </div>

    <div class="field">
      <label class="label">Pick your vibe</label>
      <div class="avatar-grid" id="avatar-grid"></div>
    </div>

    <div class="field">
      <label class="label">Your name</label>
      <input class="inp" id="lobby-name" placeholder="e.g. Alex" maxlength="24" autocomplete="off" />
    </div>

    <div class="field" id="field-roomname">
      <label class="label">Room name <span class="opt">(optional)</span></label>
      <input class="inp" id="lobby-roomname" placeholder="e.g. Friday Night Vibes" maxlength="40" autocomplete="off" />
    </div>

    <div class="field" id="field-roomcode" style="display:none">
      <label class="label">Room code</label>
      <input class="inp" id="lobby-roomcode" placeholder="6-digit code" inputmode="numeric" maxlength="6" autocomplete="off" />
    </div>

    <p class="err-msg" id="lobby-err"></p>

    <button class="primary-btn" id="lobby-btn" onclick="lobbySubmit()">
      <span id="lobby-btn-text">Create Room →</span>
    </button>
  </div>
</div>

<!-- ══════════ ROOM PAGE ══════════ -->
<div id="room" class="page">

  <!-- Header -->
  <header class="room-header">
    <div class="room-header-left">
      <span class="room-logo-icon">🎵</span>
      <div>
        <div class="room-name" id="room-name">My Jam</div>
        <button class="room-code-btn" id="room-code-btn" onclick="copyRoomCode()"></button>
      </div>
    </div>
    <div class="room-header-right">
      <div class="online-badge">
        <div class="online-dot"></div>
        <span id="listener-count">1 listening</span>
      </div>
      <button class="leave-btn" onclick="leaveRoom()">Leave</button>
    </div>
  </header>

  <div class="room-body">

    <!-- Left col -->
    <div class="left-col">

      <!-- Now Playing -->
      <div class="now-playing-card">
        <div class="album-art" id="album-art-wrap">
          <div class="now-art-placeholder" id="art-placeholder">🎵</div>
          <img id="album-art-img" style="display:none" alt="Album art" />
          <div class="playing-bars" id="playing-bars" style="display:none">
            <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
          </div>
        </div>

        <div id="song-info-area">
          <div class="empty-player" id="empty-player">
            <div class="ei">🎶</div>
            <p>Nothing playing</p>
            <span>Add a YouTube link to start</span>
          </div>
          <div id="song-details" style="display:none">
            <div class="song-title" id="song-title-el"></div>
            <div class="song-artist" id="song-artist-el"></div>
            <div class="song-addedby" id="song-addedby-el"></div>
          </div>
        </div>

        <!-- Progress -->
        <div class="progress-wrap" id="progress-wrap" onclick="handleSeek(event)">
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            <div class="progress-thumb" id="progress-thumb" style="left:0%"></div>
          </div>
          <div class="times">
            <span id="time-cur">0:00</span>
            <span id="time-dur">0:00</span>
          </div>
        </div>

        <!-- Controls -->
        <div class="controls">
          <div class="vol-wrap">
            <button class="icon-btn" id="mute-btn" onclick="toggleMute()" title="Mute">🔊</button>
            <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="80" oninput="changeVolume(this.value)" />
          </div>
          <div class="play-controls">
            <button class="play-btn" id="play-btn" onclick="togglePlayPause()" disabled>▶</button>
            <button class="skip-btn" id="skip-btn" onclick="skipSong()" disabled title="Skip">⏭</button>
          </div>
          <button class="icon-btn" id="video-toggle-btn" onclick="toggleVideo()" title="Show video">🎬</button>
        </div>

        <p class="host-note" id="host-note" style="display:none">Only the host controls playback</p>
      </div>

      <!-- Add Song -->
      <div class="add-song-card">
        <div class="card-title">Add a song</div>
        <div class="add-form">
          <input class="add-inp" id="add-url-inp" placeholder="Paste YouTube URL…" autocomplete="off" onkeydown="if(event.key==='Enter')addSong()" />
          <button class="add-btn" id="add-btn" onclick="addSong()">+</button>
        </div>
        <p class="add-err" id="add-err"></p>
      </div>

    </div>

    <!-- Right col (panels) -->
    <div class="right-col">
      <div class="panel-tabs">
        <button class="panel-tab active" onclick="switchPanel('queue',this)">Queue <span id="queue-count">(0)</span></button>
        <button class="panel-tab" onclick="switchPanel('chat',this)">Chat</button>
        <button class="panel-tab" onclick="switchPanel('users',this)">Listeners <span id="users-count">(1)</span></button>
      </div>
      <div class="panel-body">

        <!-- Queue -->
        <div class="panel active" id="panel-queue">
          <div class="queue-list" id="queue-list">
            <div class="empty-state">
              <div class="es-icon">🎶</div>
              <p>Queue is empty</p>
              <span>Add songs using the form</span>
            </div>
          </div>
        </div>

        <!-- Chat -->
        <div class="panel" id="panel-chat">
          <div class="chat-messages" id="chat-messages">
            <div class="empty-state">
              <div class="es-icon">💬</div>
              <p>No messages yet</p>
            </div>
          </div>
          <div class="chat-form">
            <input class="chat-inp" id="chat-inp" placeholder="Say something…" maxlength="500" onkeydown="if(event.key==='Enter')sendMessage()" />
            <button class="chat-send" id="chat-send" onclick="sendMessage()" disabled>↑</button>
          </div>
        </div>

        <!-- Users -->
        <div class="panel" id="panel-users">
          <div class="users-list" id="users-list"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Floating video player -->
<div id="yt-float">
  <button id="yt-float-close" onclick="toggleVideo()">✕</button>
  <div id="yt-player"></div>
</div>

<!-- Socket.IO -->
<script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.6.1/dist/socket.io.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIG — change API_URL to your backend URL
// ═══════════════════════════════════════════════════════════════════
const API_URL    = 'http://localhost:4000';
const SOCKET_URL = 'http://localhost:4000';

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
const AVATARS = ['🎵','🎸','🎹','🥁','🎺','🎷','🎻','🪗','🎤','🎧','🦄','🔥','⚡','🌙','🌈','💫'];
let selectedAvatar = '🎵';
let currentTab     = 'create';

let state = {
  room: null, user: null, socket: null,
  isPlaying: false, currentSong: null,
  currentTime: 0, duration: 0,
  queue: [], users: [], chat: [],
  volume: 80, isMuted: false,
  isHost: false,
  ytPlayer: null, ytReady: false,
  tickInterval: null,
};

// ═══════════════════════════════════════════════════════════════════
// LOBBY
// ═══════════════════════════════════════════════════════════════════
function buildAvatarGrid() {
  const grid = document.getElementById('avatar-grid');
  grid.innerHTML = AVATARS.map(a =>
    `<button class="av-btn${a===selectedAvatar?' sel':''}" onclick="selectAvatar('${a}',this)">${a}</button>`
  ).join('');
}

function selectAvatar(a, btn) {
  selectedAvatar = a;
  document.querySelectorAll('.av-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
}

function switchTab(t) {
  currentTab = t;
  document.getElementById('tab-create').classList.toggle('active', t==='create');
  document.getElementById('tab-join').classList.toggle('active', t==='join');
  document.getElementById('field-roomname').style.display = t==='create' ? 'block' : 'none';
  document.getElementById('field-roomcode').style.display = t==='join'   ? 'block' : 'none';
  document.getElementById('lobby-btn-text').textContent   = t==='create' ? 'Create Room →' : 'Join Room →';
  hideLobbyErr();
}

function showLobbyErr(msg) { const e = document.getElementById('lobby-err'); e.textContent = msg; e.classList.add('show'); }
function hideLobbyErr()    { document.getElementById('lobby-err').classList.remove('show'); }

async function lobbySubmit() {
  const name = document.getElementById('lobby-name').value.trim();
  if (!name) return showLobbyErr('Enter your name');
  hideLobbyErr();
  setBtnLoading(true);

  try {
    if (currentTab === 'create') {
      const rn = document.getElementById('lobby-roomname').value.trim();
      const res = await post('/api/rooms/create', { hostName:name, hostAvatar:selectedAvatar, roomName:rn });
      if (!res.success) throw new Error(res.error);
      enterRoom(res.room, res.room.host);
    } else {
      const code = document.getElementById('lobby-roomcode').value.trim();
      if (!code) { setBtnLoading(false); return showLobbyErr('Enter room code'); }
      const res = await post('/api/rooms/join', { roomCode:code, userName:name, userAvatar:selectedAvatar });
      if (!res.success) throw new Error(res.error);
      enterRoom(res.room, res.user);
    }
  } catch(e) {
    showLobbyErr(e.message || 'Something went wrong');
  } finally {
    setBtnLoading(false);
  }
}

function setBtnLoading(on) {
  const btn = document.getElementById('lobby-btn');
  btn.disabled = on;
  document.getElementById('lobby-btn-text').innerHTML = on
    ? '<span class="spinner"></span>'
    : (currentTab==='create' ? 'Create Room →' : 'Join Room →');
}

// ═══════════════════════════════════════════════════════════════════
// ENTER ROOM
// ═══════════════════════════════════════════════════════════════════
function enterRoom(room, user) {
  state.room = room;
  state.user = user;
  state.isHost = user.isHost || (room.host && room.host.id === user.id);

  showPage('room');
  document.getElementById('room-name').textContent    = room.name;
  document.getElementById('room-code-btn').textContent = `# ${room.id}`;
  document.getElementById('host-note').style.display  = state.isHost ? 'none' : 'block';

  initSocket();
  initYT();
}

// ═══════════════════════════════════════════════════════════════════
// SOCKET
// ═══════════════════════════════════════════════════════════════════
function initSocket() {
  const socket = io(SOCKET_URL, { transports:['websocket','polling'] });
  state.socket = socket;

  socket.on('connect', () => {
    socket.emit('join-room', state.room.id, state.user.id);
  });

  socket.on('room-state', (s) => {
    state.isPlaying  = s.isPlaying;
    state.queue      = s.queue  || [];
    state.users      = s.users  || [];
    state.chat       = s.chat   || [];
    renderQueue(); renderUsers(); renderChat();

    if (s.currentSong) {
      setCurrentSong(s.currentSong);
      const t = s.currentTime || 0;
      if (state.ytReady) { loadAndPlay(s.currentSong.videoId, t); if (!s.isPlaying) setTimeout(()=>state.ytPlayer.pauseVideo(),600); }
      else state._pendingSong = { videoId:s.currentSong.videoId, startTime:t, autoPlay:s.isPlaying };
    }
  });

  socket.on('song-changed', ({ song, startTime }) => {
    setCurrentSong(song);
    if (song) {
      if (state.ytReady) loadAndPlay(song.videoId, startTime||0);
      else state._pendingSong = { videoId:song.videoId, startTime:startTime||0, autoPlay:true };
      state.isPlaying = true;
    } else {
      state.isPlaying = false; updatePlayBtn();
    }
  });

  socket.on('queue-updated', (q) => { state.queue = q; renderQueue(); });
  socket.on('users-updated', (u) => { state.users = u; renderUsers(); });
  socket.on('new-message',   (m) => { appendChatMsg(m); });

  socket.on('force-play',  (t) => { if(t!==undefined) state.ytPlayer?.seekTo(t,true); state.ytPlayer?.playVideo(); state.isPlaying=true; updatePlayBtn(); });
  socket.on('force-pause', (t) => { if(t!==undefined) state.ytPlayer?.seekTo(t,true); state.ytPlayer?.pauseVideo(); state.isPlaying=false; updatePlayBtn(); });
  socket.on('force-seek',  (t) => { state.ytPlayer?.seekTo(t,true); state.currentTime=t; updateProgress(); });

  socket.on('new-host', (u) => {
    if (u.id === state.user.id) {
      state.isHost = true;
      document.getElementById('host-note').style.display = 'none';
    }
  });
}

// ═══════════════════════════════════════════════════════════════════
// YOUTUBE PLAYER
// ═══════════════════════════════════════════════════════════════════
let _ytInitDone = false;
window.onYouTubeIframeAPIReady = function() {
  if (_ytInitDone) return;
  _ytInitDone = true;
  if (state.room) createYTPlayer();
};

function initYT() {
  if (window.YT && window.YT.Player) createYTPlayer();
  // else onYouTubeIframeAPIReady will fire
}

function createYTPlayer() {
  state.ytPlayer = new window.YT.Player('yt-player', {
    height: '100%', width: '100%',
    playerVars: { autoplay:1, controls:0, disablekb:1, fs:0, iv_load_policy:3, modestbranding:1, rel:0, playsinline:1 },
    events: {
      onReady: () => {
        state.ytReady = true;
        state.ytPlayer.setVolume(state.isMuted ? 0 : state.volume);
        if (state._pendingSong) {
          const { videoId, startTime, autoPlay } = state._pendingSong;
          state._pendingSong = null;
          loadAndPlay(videoId, startTime);
          if (!autoPlay) setTimeout(()=>state.ytPlayer.pauseVideo(), 700);
        }
        startTicker();
      },
      onStateChange: (e) => {
        const S = window.YT.PlayerState;
        if (e.data === S.PLAYING) { state.isPlaying = true;  updatePlayBtn(); }
        if (e.data === S.PAUSED)  { state.isPlaying = false; updatePlayBtn(); }
        if (e.data === S.ENDED)   { if (state.isHost) state.socket?.emit('song-ended', state.room.id); }
      },
    }
  });
}

function loadAndPlay(videoId, startSeconds) {
  state.ytPlayer?.loadVideoById({ videoId, startSeconds: startSeconds||0 });
}

function startTicker() {
  clearInterval(state.tickInterval);
  state.tickInterval = setInterval(() => {
    if (!state.ytPlayer || !state.ytReady) return;
    try {
      state.currentTime = state.ytPlayer.getCurrentTime() || 0;
      state.duration    = state.ytPlayer.getDuration()    || 0;
      updateProgress();
    } catch {}
  }, 500);
}

// ═══════════════════════════════════════════════════════════════════
// PLAYBACK CONTROLS
// ═══════════════════════════════════════════════════════════════════
function togglePlayPause() {
  if (!state.currentSong) return;
  const t = state.ytPlayer?.getCurrentTime() || 0;
  if (state.isPlaying) {
    state.ytPlayer?.pauseVideo();
    state.socket?.emit('sync-pause', state.room.id, t);
  } else {
    state.ytPlayer?.playVideo();
    state.socket?.emit('sync-play', state.room.id, t);
  }
}

function skipSong() {
  state.socket?.emit('skip-song', state.room.id);
}

function handleSeek(e) {
  if (!state.currentSong || !state.duration) return;
  const rect = e.currentTarget.querySelector('.progress-track').getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const t = ratio * state.duration;
  state.ytPlayer?.seekTo(t, true);
  state.currentTime = t;
  updateProgress();
  state.socket?.emit('sync-seek', state.room.id, t);
}

function changeVolume(v) {
  state.volume = parseInt(v);
  state.isMuted = false;
  state.ytPlayer?.setVolume(state.volume);
  document.getElementById('mute-btn').textContent = state.volume > 50 ? '🔊' : '🔉';
}

function toggleMute() {
  state.isMuted = !state.isMuted;
  state.ytPlayer?.setVolume(state.isMuted ? 0 : state.volume);
  document.getElementById('mute-btn').textContent = state.isMuted ? '🔇' : (state.volume > 50 ? '🔊' : '🔉');
  document.getElementById('vol-slider').value = state.isMuted ? 0 : state.volume;
}

function toggleVideo() {
  const fl = document.getElementById('yt-float');
  fl.classList.toggle('show');
  document.getElementById('video-toggle-btn').classList.toggle('lit', fl.classList.contains('show'));
}

// ═══════════════════════════════════════════════════════════════════
// ADD SONG
// ═══════════════════════════════════════════════════════════════════
async function addSong() {
  const url = document.getElementById('add-url-inp').value.trim();
  if (!url) return;
  const btn = document.getElementById('add-btn');
  const errEl = document.getElementById('add-err');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  errEl.classList.remove('show');

  try {
    const res = await post(`/api/rooms/${state.room.id}/add-song`, {
      youtubeUrl: url, addedBy: state.user.id, addedByName: state.user.name
    });
    if (!res.success) throw new Error(res.error);
    document.getElementById('add-url-inp').value = '';
    switchPanel('queue', document.querySelector('.panel-tab'));
  } catch(e) {
    errEl.textContent = e.message || 'Failed to add song';
    errEl.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '+';
  }
}

// ═══════════════════════════════════════════════════════════════════
// CHAT
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('chat-inp').addEventListener('input', function() {
    document.getElementById('chat-send').disabled = !this.value.trim();
  });
});

function sendMessage() {
  const inp = document.getElementById('chat-inp');
  const msg = inp.value.trim();
  if (!msg) return;
  state.socket?.emit('send-message', state.room.id, msg, state.user);
  inp.value = '';
  document.getElementById('chat-send').disabled = true;
}

function appendChatMsg(msg) {
  const container = document.getElementById('chat-messages');
  // Remove empty state if present
  const es = container.querySelector('.empty-state');
  if (es) es.remove();

  const isOwn = msg.userId === state.user?.id;
  const div = document.createElement('div');
  div.className = `chat-msg${isOwn?' own':''}`;
  div.innerHTML = `
    ${!isOwn ? `<div class="msg-av">${msg.userAvatar}</div>` : ''}
    <div class="msg-body">
      ${!isOwn ? `<span class="msg-name">${esc(msg.userName)}</span>` : ''}
      <div class="msg-bubble">${esc(msg.message)}</div>
      <span class="msg-time">${timeAgo(msg.timestamp)}</span>
    </div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function renderChat() {
  const container = document.getElementById('chat-messages');
  if (!state.chat.length) {
    container.innerHTML = `<div class="empty-state"><div class="es-icon">💬</div><p>No messages yet</p></div>`;
    return;
  }
  container.innerHTML = '';
  state.chat.forEach(appendChatMsg);
}

// ═══════════════════════════════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════════════════════════════
function setCurrentSong(song) {
  state.currentSong = song;
  const artImg        = document.getElementById('album-art-img');
  const artPlaceholder = document.getElementById('art-placeholder');
  const emptyPlayer   = document.getElementById('empty-player');
  const songDetails   = document.getElementById('song-details');
  const playingBars   = document.getElementById('playing-bars');
  const playBtn       = document.getElementById('play-btn');
  const skipBtn       = document.getElementById('skip-btn');

  if (song) {
    artImg.src = song.thumbnail;
    artImg.style.display = 'block';
    artPlaceholder.style.display = 'none';
    emptyPlayer.style.display = 'none';
    songDetails.style.display = 'block';
    document.getElementById('song-title-el').textContent   = song.title;
    document.getElementById('song-artist-el').textContent  = song.artist;
    document.getElementById('song-addedby-el').textContent = `Added by ${song.addedByName}`;
    playBtn.disabled = false;
    skipBtn.disabled = false;
    playingBars.style.display = 'flex';
  } else {
    artImg.style.display = 'none';
    artPlaceholder.style.display = 'flex';
    emptyPlayer.style.display = 'block';
    songDetails.style.display = 'none';
    playBtn.disabled = true;
    skipBtn.disabled = true;
    playingBars.style.display = 'none';
    state.currentTime = 0; state.duration = 0;
    updateProgress();
  }
  updatePlayBtn();
}

function updatePlayBtn() {
  const btn = document.getElementById('play-btn');
  const bars = document.getElementById('playing-bars');
  btn.textContent = state.isPlaying ? '⏸' : '▶';
  if (bars) bars.style.display = (state.isPlaying && state.currentSong) ? 'flex' : 'none';
}

function updateProgress() {
  const pct = state.duration > 0 ? (state.currentTime / state.duration) * 100 : 0;
  document.getElementById('progress-fill').style.width  = `${pct}%`;
  document.getElementById('progress-thumb').style.left  = `${pct}%`;
  document.getElementById('time-cur').textContent = fmtTime(state.currentTime);
  document.getElementById('time-dur').textContent = fmtTime(state.duration);
}

function renderQueue() {
  const list = document.getElementById('queue-list');
  document.getElementById('queue-count').textContent = `(${state.queue.length})`;
  if (!state.queue.length) {
    list.innerHTML = `<div class="empty-state"><div class="es-icon">🎶</div><p>Queue is empty</p><span>Add songs using the form</span></div>`;
    return;
  }
  list.innerHTML = state.queue.map((s,i) => `
    <div class="queue-item">
      <span class="queue-pos">${i+1}</span>
      <img class="queue-thumb" src="${esc(s.thumbnail)}" alt="" />
      <div class="queue-meta">
        <div class="queue-title">${esc(s.title)}</div>
        <div class="queue-sub">${esc(s.artist)} · by ${esc(s.addedByName)}</div>
      </div>
    </div>
  `).join('');
}

function renderUsers() {
  const list = document.getElementById('users-list');
  document.getElementById('users-count').textContent  = `(${state.users.length})`;
  document.getElementById('listener-count').textContent = `${state.users.length} listening`;
  list.innerHTML = state.users.map(u => `
    <div class="user-item">
      <div class="user-av">${u.avatar}<span class="user-online"></span></div>
      <div class="user-name">${esc(u.name)}${u.id===state.user?.id?' (you)':''}</div>
      ${u.isHost ? '<span class="host-badge">Host</span>' : ''}
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════════════
// LEAVE ROOM
// ═══════════════════════════════════════════════════════════════════
function leaveRoom() {
  state.socket?.disconnect();
  clearInterval(state.tickInterval);
  try { state.ytPlayer?.stopVideo(); } catch {}
  state = { room:null, user:null, socket:null, isPlaying:false, currentSong:null, currentTime:0, duration:0, queue:[], users:[], chat:[], volume:80, isMuted:false, isHost:false, ytPlayer:null, ytReady:false, tickInterval:null };
  document.getElementById('add-url-inp').value = '';
  document.getElementById('chat-inp').value    = '';
  showPage('lobby');
}

// ═══════════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(name).classList.add('active');
}

function switchPanel(name, btn) {
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  if (btn) {
    // find the correct tab button
    document.querySelectorAll('.panel-tab').forEach(t => {
      if (t.getAttribute('onclick')?.includes(`'${name}'`)) t.classList.add('active');
    });
  }
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
}

function copyRoomCode() {
  navigator.clipboard.writeText(state.room?.id || '');
  const btn = document.getElementById('room-code-btn');
  const orig = btn.textContent;
  btn.textContent = '✅ Copied!';
  setTimeout(() => { btn.textContent = orig; }, 2000);
}

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function timeAgo(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return 'just now';
  if (d < 3600000) return `${Math.floor(d/60000)}m ago`;
  return `${Math.floor(d/3600000)}h ago`;
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function post(path, body) {
  const res = await fetch(`${API_URL}${path}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return res.json();
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
buildAvatarGrid();
document.getElementById('lobby-name').focus();
</script>
</body>
</html>
